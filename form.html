<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - School Clubs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation (same as index.html) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-school"></i>
                <span>School Clubs</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="form.html" class="nav-link active">
                        <i class="fas fa-user-graduate"></i>
                        Student Registration
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin.html" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        Admin Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        Home
                    </a>
                </li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <section class="form-container">
        <div class="form-card">
            <h1><i class="fas fa-user-graduate"></i> Student Registration</h1>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="studentName">Full Name *</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label for="studentId">Student ID *</label>
                    <input type="number" id="studentId" required>
                </div>
                <div class="form-group">
                    <label for="year">Year Level *</label>
                    <select id="year" required>
                        <option value="">Select Year Level</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Choose Your Clubs (Max 3)</label>
                    <div class="club-grid">
                        <div class="club-item" data-club="ATALAYA Club">
                            <strong>Atalaya Club</strong><br>
                        </div>
                        <div class="club-item" data-club="SSG Club">
                            <strong>SSG Club</strong><br>
                        </div>
                        <div class="club-item" data-club="SAS Club">
                            <strong>SAS Club</strong><br>
                        </div>
                        <div class="club-item" data-club="">
                            <strong></strong><br>
                        </div>
                        <div class="club-item" data-club="">
                            <strong></strong><br>
                        </div>
                        <div class="club-item" data-club="">
                            <strong></strong><br>
                        </div>
                    </div>
                    <div id="selectedClubs" style="margin-top: 1rem; font-weight: 500;"></div>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">
                    <i class="fas fa-check"></i> Register Now
                </button>
            </form>
        </div>
    </section>

    <script src="form.js"></script>
    <script src="main.js"></script>
</body>
</html>
